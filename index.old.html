<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Rewards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Menu</h2>
    <button onclick="showContent('rewards')">🎁 Rewards</button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div id="content-area">
      <h1>Welcome to Minecraft Rewards!</h1>
      <p>Click a menu option to view rewards.</p>

      <!-- Rewards Section -->
      <div id="rewards" class="section" style="display:none;">
        <h2>Rewards</h2>
        <input type="text" id="username" placeholder="Minecraft Username">

        <!-- Daily Reward -->
        <div class="reward-option">
          <button onclick="dailyReward()">🎁 Daily Reward</button>
          <p id="daily-message"></p>
        </div>

        <!-- Canvas Spin Wheel -->
        <div class="reward-option">
          <div style="position:relative; display:inline-block;">
            <canvas id="wheelCanvas" width="350" height="350"></canvas>
            <div class="pointer">▲</div> <!-- pointer fixed at top -->
          </div>
          <button id="spinBtn" onclick="spinCanvasWheel()">🎡 Spin Wheel</button>
          <p id="spin-message"></p>
        </div>

        <!-- Reset button for testing -->
        <div class="reward-option">
          <button onclick="resetRewards()">🔄 Reset Rewards (Test Only)</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
