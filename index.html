<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Rewards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎁 Minecraft Rewards</h1>

  <input id="username" placeholder="Minecraft Username">

  <button onclick="dailyReward()">🎁 Daily Reward</button>
  <button onclick="spinReward()">🎡 Spin</button>

  <div class="wheel-wrapper">
    <div class="pointer">▼</div>
    <div id="wheel" class="wheel">
      <div class="segment">Netkit</div>
      <div class="segment">Try Again</div>
      <div class="segment">100k</div>
      <div class="segment rare">1-Hit Sword</div>
      <div class="segment">Try Again</div>
      <div class="segment">Try Again</div>
    </div>
  </div>

  <p id="message"></p>
</div>

<script src="script.js"></script>
</body>
</html>
