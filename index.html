<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Rewards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT MENU -->
  <div class="menu">
    <button onclick="showPage('rewards')">🎁 Rewards</button>
    <button onclick="showPage('discord')">💬 Discord</button>
    <button onclick="showPage('about')">ℹ️ About</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- REWARDS PAGE -->
    <div id="rewards" class="page">
      <h2>Rewards</h2>
      <input id="username" placeholder="Minecraft Username">
      
      <div class="btns">
        <button id="dailyBtn" onclick="dailyReward()">Daily Reward</button>
        <button id="spinBtn" onclick="startSpin()">Spin</button>
        <button onclick="resetSpin()">🔄 Reset Spinner</button>
      </div>

      <div id="spinnerBox" class="hidden">
        <div class="pointer">▼</div>
        <div id="spinner"></div>
      </div>

      <p id="result"></p>
    </div>

    <!-- DISCORD PAGE -->
    <div id="discord" class="page hidden">
      <h2>Discord</h2>
      <p>Join our Discord server for rewards!</p>
      <a href="#" target="_blank">Join Discord</a>
    </div>

    <!-- ABOUT PAGE -->
    <div id="about" class="page hidden">
      <h2>About Server</h2>
      <p>This is a Minecraft rewards system.</p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
