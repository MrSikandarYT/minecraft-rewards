<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Rewards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- Left Menu -->
  <div class="menu">
    <button onclick="showPage('rewards')">🎁 Rewards</button>
    <button onclick="showPage('discord')">💬 Discord</button>
    <button onclick="showPage('about')">ℹ️ About</button>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div id="rewards" class="page active">
      <h2>Rewards</h2>
      <input id="username" placeholder="Minecraft Username">
      <div class="buttons">
        <button id="dailyBtn">🎁 Daily Reward</button>
        <button id="spinBtn">🎡 Spin</button>
        <button id="resetBtn">🔄 Reset Spinner</button>
      </div>

      <div id="wheelContainer">
        <div class="pointer">▼</div>
        <canvas id="wheel" width="400" height="400"></canvas>
      </div>

      <p id="result"></p>
    </div>

    <div id="discord" class="page">
      <h2>Discord</h2>
      <p>Join our Discord server for rewards!</p>
      <a href="#" target="_blank">Join Discord</a>
    </div>

    <div id="about" class="page">
      <h2>About Server</h2>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
